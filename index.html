    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { margin: 0; padding: 20px; transition: background 0.2s, color 0.2s; }
        body.light-mode { background: #eef2f5; color: #1a2c3e; }
        body.dark-mode { background: #121212; color: #e0e0e0; }
        .app-container {
            max-width: 1600px; margin: 0 auto; border-radius: 28px; overflow: hidden;
            transition: background 0.2s;
        }
        body.light-mode .app-container { background: white; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12); }
        body.dark-mode .app-container { background: #1e1e1e; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5); }
        .toolbar {
            padding: 1rem 1.5rem; border-bottom: 1px solid;
            display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem;
        }
        body.light-mode .toolbar { background: #ffffff; border-bottom-color: #e2edf2; }
        body.dark-mode .toolbar { background: #2d2d2d; border-bottom-color: #3a3a3a; }
        h1 {
            font-size: 1.5rem; font-weight: 700; margin: 0;
            background: linear-gradient(135deg, #1F5E3A, #2C8C5A);
            background-clip: text; -webkit-background-clip: text; color: transparent;
            display: inline-flex; align-items: center; gap: 8px;
        }
        h1::before { content: "✂️"; font-size: 1.7rem; color: #2C8C5A; }
        .button-group { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .action-btn {
            background: #1F5E3A; border: none; padding: 8px 18px; border-radius: 60px;
            font-weight: 500; font-size: 0.85rem; cursor: pointer; color: white;
        }
        .action-btn:hover { background: #154d2e; }
        .reset-btn { background: #c0392b; }
        .reset-btn:hover { background: #a93226; }
        .toggle-btn {
            background: #2c3e50; border: none; padding: 8px 18px; border-radius: 60px;
            font-weight: 500; font-size: 0.85rem; cursor: pointer; color: white;
        }
        .toggle-btn.active { background: #27ae60; }
        .sort-control {
            display: flex; align-items: center; gap: 12px;
            background: #f8fafd; padding: 6px 16px; border-radius: 48px;
        }
        body.dark-mode .sort-control { background: #3a3a3a; }
        #sortSelect {
            padding: 8px 16px; border-radius: 40px; border: 1px solid #cbdde6;
            background: white; font-weight: 500; font-size: 0.85rem; cursor: pointer;
        }
        body.dark-mode #sortSelect { background: #2d2d2d; color: #e0e0e0; border-color: #555; }
        .stats {
            background: #eef3f8; padding: 6px 18px; border-radius: 40px;
            font-size: 0.85rem; font-weight: 500; color: #1f5e3a;
        }
        body.dark-mode .stats { background: #2a2a2a; color: #8bc34a; }
        .stats span { font-weight: 800; background: white; padding: 2px 8px; border-radius: 30px; margin: 0 4px; }
        body.dark-mode .stats span { background: #444; color: #e0e0e0; }
        .table-wrapper { overflow-x: auto; overflow-y: auto; max-height: 70vh; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 1200px; }
        th {
            padding: 12px 8px; text-align: left; font-weight: 700; border-bottom: 2px solid;
            position: sticky; top: 0; cursor: pointer; user-select: none;
        }
        body.light-mode th { background: #f4f9fe; border-bottom-color: #dce5ec; }
        body.dark-mode th { background: #2a2a2a; border-bottom-color: #444; }

    const newSalonsCSV = `Nr,Name,Telefon,Bewertung,Anz. Bewertungen
1,Stay Sharp Barberstudio,+43 660 5021636,5.0,672

9,Le Barbier Goethe,—,4.7,3`;

    function parseCSVRow(rowStr) {
        const res = []; let inQuotes = false, cur = '';
        for (let c of rowStr) {
            if (c === '"') inQuotes = !inQuotes;
            else if (c === ',' && !inQuotes) { res.push(cur.trim()); cur = ''; }
            else cur += c;
        }
        res.push(cur.trim()); return res;
    }
    function parseCSV(csv) {
        const lines = csv.split(/\r?\n/);
        const headers = parseCSVRow(lines[0]);
        const data = [];
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const vals = parseCSVRow(line);
            let obj = {};
            headers.forEach((h, idx) => { obj[h] = vals[idx] || ''; });
            data.push(obj);
        }
        return data;
    }

    const original = parseCSV(originalCSV);
    const newOnes = parseCSV(newSalonsCSV);
    let allBase = [];
    for (let item of original) {
        allBase.push({
            Nr: parseInt(item.Nr),
            Name: item.Name,
            Telefon: item.Telefon === "—" ? "" : item.Telefon,
            Bewertung: item.Bewertung ? parseFloat(item.Bewertung) : null,
            BewertetVon: parseInt(item["Bewertet von"]) || 0
        });
    }
    let nextNr = 108;
    for (let item of newOnes) {
        allBase.push({
            Nr: nextNr++,
            Name: item.Name,
            Telefon: item.Telefon === "—" ? "" : item.Telefon,
            Bewertung: item.Bewertung ? parseFloat(item.Bewertung) : null,
            BewertetVon: parseInt(item["Anz. Bewertungen"]) || 0
        });
    }

    // Vollständige Salons mit CRM-Feldern
    let salons = [];
    let editBaseMode = false;   // Toggle für Name, Telefon, Bewertung, Anzahl
    let currentSortKey = "nr";
    let unsubscribe;

    async function resetCloudAndReload() {
        showToast("🔄 Lösche Cloud-Daten & lade 116 Friseure neu ...");
        const snapshot = await getDocs(collectionRef);
        const batch = writeBatch(db);
        snapshot.forEach(doc => { batch.delete(doc.ref); });
        await batch.commit();
        // Neue Daten schreiben
        for (let base of allBase) {
            const docRef = doc(db, "friseure_final_v2", base.Nr.toString());
            await setDoc(docRef, {
                Nr: base.Nr,
                Name: base.Name,
                Telefon: base.Telefon,
                Bewertung: base.Bewertung,
                BewertetVon: base.BewertetVon,
                priority: "Medium",
                visited: false,
                interested: "no",
                followUp: "No",
                followUpDate: "",
                comments: ""
            });
        }
        showToast("✅ Cloud zurückgesetzt – 116 Salons geladen");
    }

    async function updateSalonInFirestore(salon) {
        const docRef = doc(db, "friseure_final_v2", salon.Nr.toString());
        await setDoc(docRef, {
            Nr: salon.Nr,
            Name: salon.Name,
            Telefon: salon.Telefon,
            Bewertung: salon.Bewertung,
            BewertetVon: salon.BewertetVon,
            priority: salon.priority,
            visited: salon.visited,
            interested: salon.interested,
            followUp: salon.followUp,
            followUpDate: salon.followUpDate,
            comments: salon.comments
        }, { merge: true });
    }

    function showToast(msg) {
        const toast = document.getElementById("toastMsg");
        toast.textContent = msg;
        toast.style.opacity = "1";
        setTimeout(() => toast.style.opacity = "0", 2500);
    }

    function renderTable() {
        const sorted = [...salons].sort(getComparator(currentSortKey));
        document.getElementById("totalCount").innerText = sorted.length;
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        for (let salon of sorted) {
            const row = tbody.insertRow();
            if (salon.priority === "High") row.classList.add("priority-high-row");

            // # (immer readonly)
            const tdNr = row.insertCell(0);
            tdNr.innerText = salon.Nr;

            // Name (editierbar nur wenn editBaseMode)
            const tdName = row.insertCell(1);
            if (editBaseMode) {
                const inp = document.createElement("input");
                inp.type = "text"; inp.value = salon.Name; inp.className = "edit-input";
                inp.addEventListener("change", async (e) => {
                    salon.Name = e.target.value;
                    await updateSalonInFirestore(salon);
                    if (currentSortKey === "name") renderTable();
                });
                tdName.appendChild(inp);
            } else {
                tdName.innerText = salon.Name;
            }

            // Priorität (immer editierbar)
            const tdPrio = row.insertCell(2);
            const prioSelect = document.createElement("select");
            prioSelect.className = `priority-select ${salon.priority.toLowerCase()}`;
            ["High","Medium","Low"].forEach(l => {
                const opt = document.createElement("option");
                opt.value = l; opt.textContent = l;
                if (salon.priority === l) opt.selected = true;
                prioSelect.appendChild(opt);
            });
            prioSelect.addEventListener("change", async (e) => {
                salon.priority = e.target.value;
                await updateSalonInFirestore(salon);
                if (currentSortKey === "priority") renderTable();
                else {
                    const row = e.target.closest("tr");
                    if (salon.priority === "High") row.classList.add("priority-high-row");
                    else row.classList.remove("priority-high-row");
                    e.target.className = `priority-select ${salon.priority.toLowerCase()}`;
                }
            });
            tdPrio.appendChild(prioSelect);

            // Besucht (Checkbox, immer)
            const tdVis = row.insertCell(3);
            const chk = document.createElement("input");
            chk.type = "checkbox"; chk.className = "visited-checkbox";
            chk.checked = salon.visited;
            chk.addEventListener("change", async (e) => {
                salon.visited = e.target.checked;
                await updateSalonInFirestore(salon);
                if (currentSortKey === "visited") renderTable();
            });
            tdVis.appendChild(chk);

            // Interessent (immer)
            const tdInt = row.insertCell(4);
            const intSel = document.createElement("select");
            intSel.className = "interested-select";
            ["no","Buying","Leasing"].forEach(v => {
                const opt = document.createElement("option");
                opt.value = v; opt.textContent = v;
                if (salon.interested === v) opt.selected = true;
                intSel.appendChild(opt);
            });
            intSel.addEventListener("change", async (e) => {
                salon.interested = e.target.value;
                await updateSalonInFirestore(salon);
                if (currentSortKey === "interested") renderTable();
            });
            tdInt.appendChild(intSel);

            // Follow-up (immer)
            const tdFol = row.insertCell(5);
            const folSel = document.createElement("select");
            folSel.className = "followup-select";
            ["No","Yes"].forEach(v => {
                const opt = document.createElement("option");
                opt.value = v; opt.textContent = v;
                if (salon.followUp === v) opt.selected = true;
                folSel.appendChild(opt);
            });
            folSel.addEventListener("change", async (e) => {
                salon.followUp = e.target.value;
                await updateSalonInFirestore(salon);
                if (currentSortKey === "followup") renderTable();
            });
            tdFol.appendChild(folSel);

            // Termin (immer)
            const tdDate = row.insertCell(6);
            const dateInp = document.createElement("input");
            dateInp.type = "date"; dateInp.className = "date-input";
            dateInp.min = "2026-01-01"; dateInp.max = "2099-12-31";
            if (salon.followUpDate) dateInp.value = salon.followUpDate;
            dateInp.addEventListener("change", async (e) => {
                salon.followUpDate = e.target.value;
                await updateSalonInFirestore(salon);
                if (currentSortKey === "date") renderTable();
            });
            tdDate.appendChild(dateInp);

            // Kommentar (immer)
            const tdCom = row.insertCell(7);
            const comInp = document.createElement("input");
            comInp.type = "text"; comInp.className = "comments-input";
            comInp.placeholder = "Notiz ..."; comInp.value = salon.comments || "";
            comInp.addEventListener("change", async (e) => {
                salon.comments = e.target.value;
                await updateSalonInFirestore(salon);
            });
            tdCom.appendChild(comInp);

            // Telefon (editierbar nur bei editBaseMode)
            const tdTel = row.insertCell(8);
            if (editBaseMode) {
                const inp = document.createElement("input");
                inp.type = "tel"; inp.value = salon.Telefon; inp.className = "edit-input";
                inp.addEventListener("change", async (e) => {
                    salon.Telefon = e.target.value;
                    await updateSalonInFirestore(salon);
                });
                tdTel.appendChild(inp);
            } else {
                if (salon.Telefon) {
                    const a = document.createElement("a");
                    a.href = `tel:${salon.Telefon.replace(/\s/g, '')}`;
                    a.innerText = salon.Telefon; a.className = "phone-link";
                    tdTel.appendChild(a);
                } else tdTel.innerHTML = '<span class="empty-value">—</span>';
            }

            // Bewertung (editierbar nur bei editBaseMode)
            const tdRat = row.insertCell(9);
            if (editBaseMode) {
                const inp = document.createElement("input");
                inp.type = "number"; inp.step = "0.1"; inp.min = "0"; inp.max = "5";
                inp.value = salon.Bewertung !== null ? salon.Bewertung : "";
                inp.placeholder = "–";
                inp.className = "edit-number";
                inp.addEventListener("change", async (e) => {
                    let val = e.target.value === "" ? null : parseFloat(e.target.value);
                    if (val !== null && (isNaN(val) || val < 0)) val = null;
                    salon.Bewertung = val;
                    await updateSalonInFirestore(salon);
                    if (currentSortKey === "rating") renderTable();
                });
                tdRat.appendChild(inp);
            } else {
                if (salon.Bewertung !== null && !isNaN(salon.Bewertung)) {
                    const cls = salon.Bewertung >= 4.7 ? "rating-high" : "";
                    tdRat.innerHTML = `<span class="rating-badge ${cls}">⭐ ${salon.Bewertung.toFixed(1)}</span>`;
                } else tdRat.innerHTML = '<span class="empty-value">—</span>';
            }

            // Bewertet von (editierbar nur bei editBaseMode)
            const tdRev = row.insertCell(10);
            if (editBaseMode) {
                const inp = document.createElement("input");
                inp.type = "number"; inp.step = "1"; inp.min = "0";
                inp.value = salon.BewertetVon;
                inp.className = "edit-number";
                inp.addEventListener("change", async (e) => {
                    let val = parseInt(e.target.value, 10);
                    if (isNaN(val)) val = 0;
                    salon.BewertetVon = val;
                    await updateSalonInFirestore(salon);
                    if (currentSortKey === "reviews") renderTable();
                });
                tdRev.appendChild(inp);
            } else {
                tdRev.innerText = salon.BewertetVon > 0 ? salon.BewertetVon : "—";
            }
        }
    }

    function getComparator(key) {
        return (a,b) => {
            if (key === "nr") return a.Nr - b.Nr;
            if (key === "name") return a.Name.localeCompare(b.Name);
            if (key === "priority") {
                const order = { High:3, Medium:2, Low:1 };
                return (order[b.priority]||0) - (order[a.priority]||0);
            }
            if (key === "visited") return (b.visited?1:0) - (a.visited?1:0);
            if (key === "interested") {
                const map = { Buying:3, Leasing:2, no:1 };
                return (map[b.interested]||0) - (map[a.interested]||0);
            }
            if (key === "followup") return (b.followUp==="Yes"?1:0) - (a.followUp==="Yes"?1:0);
            if (key === "date") {
                let da = a.followUpDate ? new Date(a.followUpDate).getTime() : 0;
                let db = b.followUpDate ? new Date(b.followUpDate).getTime() : 0;
                return db - da;
            }
            if (key === "rating") {
                let ra = a.Bewertung ?? -1, rb = b.Bewertung ?? -1;
                if (ra === rb) return (b.BewertetVon||0) - (a.BewertetVon||0);
                return rb - ra;
            }
            if (key === "reviews") return (b.BewertetVon||0) - (a.BewertetVon||0);
            return 0;
        };
    }

    function setSort(key) {
        currentSortKey = key;
        renderTable();
        document.getElementById("sortSelect").value = key;
    }

    async function addNewSalon() {
        let maxNr = 0;
        for (let s of salons) if (s.Nr > maxNr) maxNr = s.Nr;
        const newNr = maxNr + 1;
        const newSalon = {
            Nr: newNr,
            Name: "Neuer Friseur",
            Telefon: "",
            Bewertung: null,
            BewertetVon: 0,
            priority: "Medium",
            visited: false,
            interested: "no",
            followUp: "No",
            followUpDate: "",
            comments: ""
        };
        const docRef = doc(db, "friseure_final_v2", newNr.toString());
        await setDoc(docRef, newSalon);
        showToast(`➕ Friseur #${newNr} hinzugefügt`);
    }

    function toggleBaseEdit() {
        editBaseMode = !editBaseMode;
        const btn = document.getElementById("toggleBaseEditBtn");
        if (editBaseMode) {
            btn.innerHTML = "🔓 Basisdaten editieren (EIN)";
            btn.classList.add("active");
        } else {
            btn.innerHTML = "✏️ Basisdaten editieren (AUS)";
            btn.classList.remove("active");
        }
        renderTable();
    }

    function toggleDarkMode() {
        const body = document.body;
        if (body.classList.contains("light-mode")) {
            body.classList.remove("light-mode");
            body.classList.add("dark-mode");
            document.getElementById("darkModeBtn").innerHTML = "☀️ Light Mode";
        } else {
            body.classList.remove("dark-mode");
            body.classList.add("light-mode");
            document.getElementById("darkModeBtn").innerHTML = "🌙 Dark Mode";
        }
    }

    function bindUI() {
        document.querySelectorAll("#tableHeader th[data-sort]").forEach(th => {
            th.addEventListener("click", () => setSort(th.getAttribute("data-sort")));
        });
        document.getElementById("sortSelect").addEventListener("change", (e) => setSort(e.target.value));
        document.getElementById("addBtn").addEventListener("click", addNewSalon);
        document.getElementById("toggleBaseEditBtn").addEventListener("click", toggleBaseEdit);
        document.getElementById("darkModeBtn").addEventListener("click", toggleDarkMode);
        document.getElementById("resetCloudBtn").addEventListener("click", async () => {
            if (confirm("Cloud komplett zurücksetzen? Alle eigenen Änderungen gehen verloren, 116 Standard-Friseure werden neu geladen.")) {
                await resetCloudAndReload();
            }
        });
    }

    // Start: Firestore Live-Listener
    onSnapshot(collectionRef, (snapshot) => {
        const newList = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            newList.push({
                Nr: data.Nr,
                Name: data.Name || "",
                Telefon: data.Telefon || "",
                Bewertung: data.Bewertung ?? null,
                BewertetVon: data.BewertetVon || 0,
                priority: data.priority || "Medium",
                visited: data.visited || false,
                interested: data.interested || "no",
                followUp: data.followUp || "No",
                followUpDate: data.followUpDate || "",
                comments: data.comments || ""
            });
        });
        newList.sort((a,b) => a.Nr - b.Nr);
        salons = newList;
        renderTable();
        if (salons.length === 0) {
            showToast("⚠️ Keine Daten in Cloud – bitte „Cloud zurücksetzen“ drücken");
        } else {
            showToast(`☁️ ${salons.length} Salons geladen`);
        }
    });

    bindUI();
    // Optional: Beim Start prüfen, ob Daten vorhanden sind (kein automatischer Reset, weil User selbst entscheiden soll)
</script>
</body>
</html>
